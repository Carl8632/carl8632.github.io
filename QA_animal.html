<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals Content - Lions Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: transparent; }
        
        /* 泡泡尖角指向左邊 (老師) */
        .bubble-left::after {
            content: ''; position: absolute; left: -10px; top: 25px;
            border-width: 10px 10px 10px 0; border-color: transparent #dcfce7 transparent transparent;
        }
        /* 泡泡尖角指向右邊 (學生) */
        .bubble-right::after {
            content: ''; position: absolute; right: -10px; top: 25px;
            border-width: 10px 0 10px 10px; border-color: transparent transparent transparent #f1f5f9;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center justify-center">

    <div class="w-full flex flex-col items-center">
        
        <div class="mb-12">
           <img src="images/QA_lion.png" alt="Lions Practice" class="w-80 h-auto rounded-3xl shadow-2xl border-4 border-white mx-auto">
        </div>

        <div class="w-full max-w-3xl space-y-10">
            
            <div class="flex items-center space-x-6">
                <div class="w-24 h-24 bg-blue-100 rounded-full flex-shrink-0 flex items-center justify-center shadow-lg text-6xl">🦉</div>
                <div class="relative bg-green-100 p-6 rounded-3xl shadow-sm max-w-[70%] bubble-left cursor-pointer hover:bg-green-200 transition-colors" 
                     onclick="speak('How many lions are there?')">
                    <p class="text-3xl font-bold text-slate-800">How many lions are there?</p>
                </div>
            </div>

            <div class="flex items-center justify-end space-x-6 flex-row-reverse space-x-reverse">
                <div class="w-24 h-24 bg-orange-100 rounded-full flex-shrink-0 flex items-center justify-center shadow-lg text-6xl">🦆</div>
                <div class="relative bg-slate-100 p-6 rounded-3xl shadow-sm max-w-[70%] bubble-right cursor-pointer hover:bg-slate-200 transition-colors"
                     onclick="speak('There are three lions.')">
                    <p class="text-3xl font-bold text-slate-800">There are three lions.</p>
                </div>
            </div>

        </div>
        
        <div class="mt-16 text-slate-400 text-sm font-medium">點擊對話框即可聆聽發音</div>
    </div>

    <script>
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.85;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
